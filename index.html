<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Happy birthday Shapla!</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prefixfree/1.0.7/prefixfree.min.js"></script>
    <style>
      .canNone {
        display: none;
      }
      .canvasBlock {
        display: block;
      }
      .node {
        display: none;
      }

      button {
        font-size: 30px;
        text-decoration: none;
        color: rgb(214, 214, 64);
        border: white solid 2px;
        border-radius: 10px;
        padding: 5px;
        background-color: transparent;
      }
      button:hover {
        border: solid blue 5px;
      }
    </style>
  </head>
  <body>
    <!-- partial:index.partial.html -->
    <canvas class="canNone can" id="c"></canvas>
    <div
      id="button"
      style="position: absolute; bottom: 20px; left: 30%"
      class="canNone"
    >
      <a href="./happy-birthday/index.html"> <button>Click & Next</button></a>
    </div>
    <div id="first-intro">
      <h1>Birthday Countdown</h1>
      <p id="instruction">Time left until the birthday:</p>
      <div id="countdown">Loading...</div>
      <div id="birthday-message" onclick="startAnimation()">
        Today is your Birthday! Click to Celebrate!
      </div>
    </div>
    <script src="./script.js"></script>
    <script src="./script2.js"></script>
  </body>
</html>
